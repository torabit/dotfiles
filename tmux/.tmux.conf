# Proper prefix
set-option -g prefix C-a
unbind C-t
bind C-a send-prefix

# Aggressive resize
setw -g aggressive-resize on

set -s escape-time 10

# Copy mode
setw -g mode-keys vi

# Mouse
set -g mouse on
bind-key -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T edit-mode-vi WheelDownPane send-keys -X scroll-down

# Key bindings

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Kill pane
bind -r e kill-pane -a

# Unbind old C-hjkl (vim-tmux-navigator defaults)
unbind -n 'C-h'
unbind -n 'C-j'
unbind -n 'C-k'
unbind -n 'C-l'

# Smart pane switching with vim-tmux-navigator (Alt+hjkl)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R

# Prefix + hjkl pane switching (fallback when C-hjkl is intercepted)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Moving window
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Resizing pane
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# ── PaperColor Light Theme ────────────────────────────────────

# Pane borders
set -g pane-border-style "fg=#bcbcbc"
set -g pane-active-border-style "fg=#d70087"
set -g pane-border-status off

# Mode & message
set -g mode-style "fg=#444444,bg=#d7d7af"
set -g message-style "fg=#005f87,bg=#eeeeee"
set -g message-command-style "fg=#af0000,bg=#eeeeee"

# Status bar
set -g status "on"
set -g status-interval 5
set -g status-justify left
set -g status-position top
set -g status-style "fg=#878787,bg=#eeeeee"

set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#{?client_prefix,#[fg=#eeeeee bg=#d70087 bold],#[fg=#d70087 bg=#eeeeee bold]} #S "
set -g status-right "#[fg=#878787]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) %H:%M "

# Window tabs
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=#d75f00,bg=#eeeeee,underscore"
setw -g window-status-style "NONE"
setw -g window-status-format "#[fg=#878787,bg=#eeeeee] #I #{b:pane_current_path} "
setw -g window-status-current-format "#[fg=#d70087,bg=#eeeeee,bold] #I #{b:pane_current_path} "

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-command 'echo -n {} | pbcopy'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
